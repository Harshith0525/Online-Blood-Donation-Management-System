# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/blood_donation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate Configuration - Automatically update schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8080

# Application Properties
app.jwtSecret=SuperSecretKeyForBloodDonationSystemNeedToBeLongEnough
app.jwtExpirationMs=86400000
